<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="app-version" content="2026-05-23-mobile-fix-2">
  <title>训练记录</title>
  <style>
    :root {
      --bg: #080b0f;
      --panel: #111821;
      --panel-2: #172231;
      --line: #263447;
      --text: #f4f7fb;
      --muted: #96a4b8;
      --accent: #ff7a3d;
      --squat: #ff7a3d;
      --bench: #33d6c6;
      --deadlift: #9d7cff;
      --danger: #ff5d6c;
      --radius: 8px;
      --shadow: 0 18px 48px rgba(0, 0, 0, .32);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 122, 61, .18), transparent 30%),
        radial-gradient(circle at 85% 18%, rgba(51, 214, 198, .13), transparent 28%),
        linear-gradient(145deg, #080b0f 0%, #101722 50%, #07090d 100%);
      padding: 18px 14px 92px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .app {
      width: min(760px, 100%);
      margin: 0 auto;
    }

    .hero {
      display: grid;
      gap: 18px;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      background: linear-gradient(145deg, rgba(17, 24, 33, .94), rgba(23, 34, 49, .88));
      box-shadow: var(--shadow);
    }

    .hero-kicker {
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 7px 0 8px;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric {
      min-width: 0;
      padding: 13px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      background: rgba(8, 11, 15, .42);
    }

    .metric span {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      min-height: 24px;
      overflow-wrap: anywhere;
      font-size: 18px;
      line-height: 1.35;
    }

    .metric.wide {
      grid-column: span 2;
    }

    .tabs {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin: 14px 0;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      background: rgba(8, 11, 15, .82);
      backdrop-filter: blur(18px);
    }

    .tab {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      font-weight: 800;
    }

    .tab.active {
      border-color: rgba(255, 122, 61, .35);
      background: rgba(255, 122, 61, .14);
      color: var(--text);
    }

    .view { display: none; }
    .view.active { display: block; }

    .panel {
      margin-bottom: 14px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      background: rgba(17, 24, 33, .9);
      box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
    }

    h2 {
      margin: 0 0 14px;
      font-size: 16px;
      letter-spacing: 0;
    }

    .exercise-tabs,
    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .mode-tabs {
      grid-template-columns: repeat(2, 1fr);
    }

    .choice {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(8, 11, 15, .5);
      color: var(--muted);
      font-weight: 800;
    }

    .choice.active[data-exercise="squat"] { background: var(--squat); color: #fff; border-color: transparent; }
    .choice.active[data-exercise="bench"] { background: var(--bench); color: #06211e; border-color: transparent; }
    .choice.active[data-exercise="deadlift"] { background: var(--deadlift); color: #fff; border-color: transparent; }
    .choice.active[data-mode],
    .choice.active[data-filter="all"] { background: rgba(255, 122, 61, .18); color: var(--text); border-color: rgba(255, 122, 61, .45); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .date-picker {
      position: relative;
      z-index: 2;
    }

    .date-display {
      width: 100%;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(8, 11, 15, .78), rgba(23, 34, 49, .72));
      color: var(--text);
      padding: 10px 12px;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .04);
      touch-action: manipulation;
    }

    .date-display:focus-visible,
    .date-display.active {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 122, 61, .16);
    }

    .date-display small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .date-arrow {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: rgba(255, 122, 61, .13);
      color: var(--accent);
      transition: transform .2s ease;
    }

    .date-display.active .date-arrow {
      transform: rotate(180deg);
    }

    .calendar {
      display: none;
      margin-top: 10px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      background: rgba(8, 11, 15, .72);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .04);
      position: relative;
      z-index: 3;
    }

    .calendar.open {
      display: block;
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .calendar-title {
      font-size: 15px;
      font-weight: 950;
    }

    .cal-nav {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(23, 34, 49, .72);
      color: var(--text);
      font-size: 20px;
      line-height: 1;
    }

    .calendar-week,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .calendar-week {
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-align: center;
    }

    .day {
      aspect-ratio: 1;
      min-width: 0;
      border: 1px solid transparent;
      border-radius: 8px;
      background: rgba(17, 24, 33, .62);
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
    }

    .day.other {
      color: rgba(150, 164, 184, .38);
      background: transparent;
    }

    .day.today {
      border-color: rgba(51, 214, 198, .55);
      color: var(--bench);
    }

    .day.selected {
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), #ff9e62);
      color: #160804;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(8, 11, 15, .72);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
      color-scheme: dark;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 122, 61, .16);
    }

    .primary,
    .ghost,
    .danger {
      width: 100%;
      min-height: 46px;
      border-radius: var(--radius);
      font-weight: 900;
    }

    .primary {
      border: none;
      background: linear-gradient(135deg, var(--accent), #ff9e62);
      color: #140805;
    }

    .ghost {
      border: 1px solid var(--line);
      background: rgba(8, 11, 15, .45);
      color: var(--text);
    }

    .danger {
      border: 1px solid rgba(255, 93, 108, .42);
      background: rgba(255, 93, 108, .1);
      color: #ff9ba5;
    }

    .best-grid,
    .history-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      padding: 15px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      background: rgba(8, 11, 15, .48);
    }

    .stat .value {
      margin-bottom: 6px;
      font-size: 24px;
      font-weight: 900;
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .squat-text { color: var(--squat); }
    .bench-text { color: var(--bench); }
    .deadlift-text { color: var(--deadlift); }

    .gender .choice {
      width: 100%;
      min-width: 0;
      position: relative;
      z-index: 1;
      pointer-events: auto;
      touch-action: manipulation;
      border-radius: 999px;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      height: 310px;
      margin-top: 12px;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .legend {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      margin-right: 6px;
      border-radius: 50%;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 12px 0;
    }

    .records {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    .record {
      display: grid;
      grid-template-columns: 58px 58px 1fr 36px;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      background: rgba(8, 11, 15, .45);
    }

    .badge {
      padding: 4px 8px;
      border-radius: 6px;
      text-align: center;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .badge.squat { background: var(--squat); }
    .badge.bench { background: var(--bench); color: #06211e; }
    .badge.deadlift { background: var(--deadlift); }

    .record-date {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .record-main {
      min-width: 0;
    }

    .record-main strong {
      display: block;
      margin-bottom: 2px;
    }

    .record-main span {
      color: var(--muted);
      font-size: 13px;
    }

    .delete {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255, 93, 108, .32);
      border-radius: var(--radius);
      background: rgba(255, 93, 108, .1);
      color: #ff9ba5;
      font-size: 20px;
      line-height: 1;
    }

    .empty {
      padding: 28px 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .dots-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .gender {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .dots-result {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .big-number {
      font-size: 36px;
      font-weight: 950;
      color: var(--accent);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      z-index: 20;
      transform: translate(-50%, 120px);
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: var(--radius);
      background: rgba(17, 24, 33, .96);
      color: var(--text);
      box-shadow: var(--shadow);
      opacity: 0;
      transition: .22s ease;
    }

    .toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }

    @media (max-width: 640px) {
      body { padding: 12px 10px 92px; }
      h1 { font-size: 26px; }
      .hero { padding: 18px; }
      .metrics,
      .form-grid,
      .best-grid,
      .history-stats,
      .toolbar,
      .dots-grid,
      .dots-result {
        grid-template-columns: 1fr;
      }
      .metric.wide { grid-column: auto; }
      .record { grid-template-columns: 52px 54px 1fr 34px; gap: 8px; }
      .tabs { gap: 5px; }
      .tab { font-size: 14px; }
      .canvas-wrap { height: 260px; }
      .best-grid,
      .history-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <div class="hero-kicker">Powerlifting Log</div>
        <h1>力量举训练记录</h1>
        <p>记录每次训练，追踪三项趋势，计算估算 1RM 和 DOTS。所有数据只保存在当前浏览器。</p>
      </div>
      <div class="metrics">
        <div class="metric">
          <span>总记录</span>
          <strong id="summaryTotal">0</strong>
        </div>
        <div class="metric wide">
          <span>当前预测最佳三项</span>
          <strong id="summaryBest">-</strong>
        </div>
        <div class="metric">
          <span>最近训练</span>
          <strong id="summaryLatest">-</strong>
        </div>
      </div>
    </section>

    <nav class="tabs" aria-label="主导航">
      <button class="tab active" data-view="record">记录</button>
      <button class="tab" data-view="history">历史</button>
      <button class="tab" data-view="chart">曲线</button>
      <button class="tab" data-view="dots">系数</button>
    </nav>

    <section class="view active" id="view-record">
      <div class="panel">
        <div class="exercise-tabs" id="exerciseTabs">
          <button class="choice active" data-exercise="squat">深蹲</button>
          <button class="choice" data-exercise="bench">卧推</button>
          <button class="choice" data-exercise="deadlift">硬拉</button>
        </div>
        <div class="field">
          <label for="trainDate">训练日期</label>
          <div class="date-picker" id="datePicker">
            <button class="date-display" id="dateToggle" type="button" aria-expanded="false" aria-controls="calendarPanel">
              <span>
                <strong id="dateText">-</strong>
                <small id="dateSubtext">-</small>
              </span>
              <span class="date-arrow" aria-hidden="true">⌄</span>
            </button>
            <input id="trainDate" type="hidden">
            <div class="calendar" id="calendarPanel">
              <div class="calendar-head">
                <button class="cal-nav" id="prevMonth" type="button" aria-label="上一月">‹</button>
                <div class="calendar-title" id="calendarTitle"></div>
                <button class="cal-nav" id="nextMonth" type="button" aria-label="下一月">›</button>
              </div>
              <div class="calendar-week" aria-hidden="true">
                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
              </div>
              <div class="calendar-grid" id="calendarGrid" role="grid" aria-label="日历"></div>
            </div>
          </div>
        </div>
        <div class="form-grid">
          <div class="field">
            <label for="weight">重量 (kg)</label>
            <input id="weight" type="number" min="0" step="0.5" inputmode="decimal" placeholder="100">
          </div>
          <div class="field">
            <label for="reps">次数</label>
            <input id="reps" type="number" min="1" step="1" inputmode="numeric" value="5">
          </div>
          <div class="field">
            <label for="sets">组数</label>
            <input id="sets" type="number" min="1" step="1" inputmode="numeric" value="3">
          </div>
        </div>
        <button class="primary" id="addRecord">保存记录</button>
      </div>

      <div class="panel">
        <h2>历史最佳估算 1RM</h2>
        <div class="best-grid">
          <div class="stat">
            <div class="value squat-text" id="bestSquat">-</div>
            <div class="label">深蹲</div>
          </div>
          <div class="stat">
            <div class="value bench-text" id="bestBench">-</div>
            <div class="label">卧推</div>
          </div>
          <div class="stat">
            <div class="value deadlift-text" id="bestDeadlift">-</div>
            <div class="label">硬拉</div>
          </div>
          <div class="stat">
            <div class="value" id="bestTotal">-</div>
            <div class="label">总和</div>
          </div>
        </div>
      </div>
    </section>

    <section class="view" id="view-history">
      <div class="panel">
        <div class="exercise-tabs" id="historyFilter">
          <button class="choice active" data-filter="all">全部</button>
          <button class="choice" data-filter="squat" data-exercise="squat">深蹲</button>
          <button class="choice" data-filter="bench" data-exercise="bench">卧推</button>
          <button class="choice" data-filter="deadlift" data-exercise="deadlift">硬拉</button>
        </div>
        <div class="toolbar">
          <button class="ghost" id="exportData">导出备份</button>
          <label class="ghost" style="display:flex;align-items:center;justify-content:center;cursor:pointer">
            导入备份
            <input id="importData" type="file" accept="application/json,.json" style="position:absolute;opacity:0;width:1px;height:1px">
          </label>
          <button class="danger" id="clearData">清空数据</button>
        </div>
        <div class="history-stats">
          <div class="stat">
            <div class="value" id="countTotal">0</div>
            <div class="label">总计</div>
          </div>
          <div class="stat">
            <div class="value squat-text" id="countSquat">0</div>
            <div class="label">深蹲</div>
          </div>
          <div class="stat">
            <div class="value bench-text" id="countBench">0</div>
            <div class="label">卧推</div>
          </div>
        </div>
        <div class="records" id="recordsList"></div>
        <div class="empty" id="recordsEmpty">还没有训练记录。去记录页添加第一组吧。</div>
      </div>
    </section>

    <section class="view" id="view-chart">
      <div class="panel">
        <h2>重量变化趋势</h2>
        <div class="mode-tabs">
          <button class="choice active" data-mode="e1rm">估算 1RM</button>
          <button class="choice" data-mode="raw">实际重量</button>
        </div>
        <div class="canvas-wrap">
          <canvas id="progressChart"></canvas>
        </div>
        <div class="legend">
          <span><i class="dot" style="background:var(--squat)"></i>深蹲</span>
          <span><i class="dot" style="background:var(--bench)"></i>卧推</span>
          <span><i class="dot" style="background:var(--deadlift)"></i>硬拉</span>
        </div>
      </div>
    </section>

    <section class="view" id="view-dots">
      <div class="panel">
        <div class="dots-grid">
          <div class="field">
            <label>性别</label>
            <div class="gender" id="genderTabs">
              <button class="choice active" data-gender="m" type="button">男</button>
              <button class="choice" data-gender="f" type="button">女</button>
            </div>
          </div>
          <div class="field">
            <label for="bodyweight">体重 (kg)</label>
            <input id="bodyweight" type="number" min="20" max="300" step="0.1" inputmode="decimal" placeholder="75">
          </div>
        </div>
        <div class="form-grid">
          <div class="field">
            <label for="dotsSquat">深蹲 (kg)</label>
            <input id="dotsSquat" type="number" min="0" step="0.5" inputmode="decimal">
          </div>
          <div class="field">
            <label for="dotsBench">卧推 (kg)</label>
            <input id="dotsBench" type="number" min="0" step="0.5" inputmode="decimal">
          </div>
          <div class="field">
            <label for="dotsDeadlift">硬拉 (kg)</label>
            <input id="dotsDeadlift" type="number" min="0" step="0.5" inputmode="decimal">
          </div>
        </div>
        <button class="ghost" id="fillDots">从最佳 1RM 更新</button>
        <div class="dots-result">
          <div class="stat">
            <div class="label">DOTS 系数</div>
            <div class="big-number" id="dotsScore">-</div>
          </div>
          <div class="stat">
            <div class="label">三项总重</div>
            <div class="big-number" id="dotsTotal">-</div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div class="toast" id="toast"></div>

  <script>
    const STORE_KEY = "plRecords";
    const names = { squat: "深蹲", bench: "卧推", deadlift: "硬拉" };
    const colors = { squat: "#ff7a3d", bench: "#33d6c6", deadlift: "#9d7cff" };
    let records = loadRecords();
    let currentExercise = "squat";
    let historyFilter = "all";
    let chartMode = "e1rm";
    let gender = "m";

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => Array.from(document.querySelectorAll(selector));

    function todayISO() {
      const d = new Date();
      const offset = d.getTimezoneOffset() * 60000;
      return new Date(d.getTime() - offset).toISOString().slice(0, 10);
    }

    function parseISODate(value) {
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function formatDisplayDate(value) {
      const date = parseISODate(value);
      const week = ["\u5468\u65e5", "\u5468\u4e00", "\u5468\u4e8c", "\u5468\u4e09", "\u5468\u56db", "\u5468\u4e94", "\u5468\u516d"][date.getDay()];
      return `${date.getFullYear()}\u5e74${date.getMonth() + 1}\u6708${date.getDate()}\u65e5 ${week}`;
    }

    function pad2(value) {
      return value < 10 ? `0${value}` : String(value);
    }

    function toISODate(date) {
      return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
    }

    let calendarView = parseISODate(todayISO());

    function setTrainDate(value) {
      $("#trainDate").value = value;
      $("#dateText").textContent = formatDisplayDate(value);
      $("#dateSubtext").textContent = value;
      calendarView = parseISODate(value);
      renderCalendar();
    }

    function toggleCalendar(force) {
      const panel = $("#calendarPanel");
      const button = $("#dateToggle");
      const shouldOpen = typeof force === "boolean" ? force : !panel.classList.contains("open");
      panel.classList.toggle("open", shouldOpen);
      button.classList.toggle("active", shouldOpen);
      button.setAttribute("aria-expanded", String(shouldOpen));
    }

    function renderCalendar() {
      const selected = $("#trainDate").value;
      const today = todayISO();
      const year = calendarView.getFullYear();
      const month = calendarView.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const prevMonthDays = new Date(year, month, 0).getDate();
      $("#calendarTitle").textContent = `${year}\u5e74 ${month + 1}\u6708`;
      const grid = $("#calendarGrid");
      grid.innerHTML = "";
      const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
      for (let i = 0; i < totalCells; i++) {
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "day";
        let date;
        if (i < firstDay) {
          const day = prevMonthDays - firstDay + i + 1;
          date = new Date(year, month - 1, day);
          cell.classList.add("other");
        } else if (i >= firstDay + daysInMonth) {
          const day = i - firstDay - daysInMonth + 1;
          date = new Date(year, month + 1, day);
          cell.classList.add("other");
        } else {
          date = new Date(year, month, i - firstDay + 1);
        }
        const iso = toISODate(date);
        cell.textContent = date.getDate();
        if (iso === today) cell.classList.add("today");
        if (iso === selected) cell.classList.add("selected");
        const selectDay = () => {
          setTrainDate(iso);
          toggleCalendar(false);
        };
        cell.addEventListener("click", selectDay);
        grid.appendChild(cell);
      }
    }

    function loadRecords() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORE_KEY) || "[]");
        return Array.isArray(parsed) ? parsed.filter(isValidRecord) : [];
      } catch {
        return [];
      }
    }

    function isValidRecord(record) {
      return record
        && typeof record.date === "string"
        && ["squat", "bench", "deadlift"].includes(record.exercise)
        && Number(record.weight) > 0
        && Number(record.reps) > 0
        && Number(record.sets) > 0;
    }

    function saveRecords() {
      localStorage.setItem(STORE_KEY, JSON.stringify(records));
    }

    function estimate1RM(weight, reps) {
      return reps === 1 ? weight : Math.round(weight * (1 + reps / 30) * 10) / 10;
    }

    function bestLifts() {
      const best = { squat: 0, bench: 0, deadlift: 0 };
      records.forEach((record) => {
        const value = estimate1RM(Number(record.weight), Number(record.reps));
        if (value > best[record.exercise]) best[record.exercise] = value;
      });
      return best;
    }

    function formatKg(value) {
      return value > 0 ? `${Number(value).toFixed(1)} kg` : "-";
    }

    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function setActive(containerSelector, attr, value) {
      $$(`${containerSelector} [${attr}]`).forEach((button) => {
        button.classList.toggle("active", button.getAttribute(attr) === value);
      });
    }

    function switchView(view) {
      $$(".tab").forEach((button) => button.classList.toggle("active", button.dataset.view === view));
      $$(".view").forEach((panel) => panel.classList.toggle("active", panel.id === `view-${view}`));
      if (view === "history") renderHistory();
      if (view === "chart") renderChart();
      if (view === "dots") renderDots();
      renderSummary();
    }

    function addRecord() {
      const date = $("#trainDate").value;
      const weight = Number($("#weight").value);
      const reps = Number($("#reps").value);
      const sets = Number($("#sets").value);
      if (!date) return showToast("请选择日期");
      if (!weight || weight <= 0) return showToast("请输入有效重量");
      if (!reps || reps <= 0) return showToast("请输入有效次数");
      if (!sets || sets <= 0) return showToast("请输入有效组数");

      records.push({
        id: Date.now(),
        date,
        exercise: currentExercise,
        weight,
        reps,
        sets
      });
      records.sort((a, b) => new Date(a.date) - new Date(b.date));
      saveRecords();
      $("#weight").value = "";
      renderAll();
      showToast("已保存");
    }

    function deleteRecord(id) {
      if (!confirm("确定删除这条记录？")) return;
      records = records.filter((record) => record.id !== id);
      saveRecords();
      renderAll();
      showToast("已删除");
    }

    function renderSummary() {
      const best = bestLifts();
      const latest = records.length ? records[records.length - 1].date.slice(5) : "-";
      const total = best.squat + best.bench + best.deadlift;
      $("#summaryTotal").textContent = records.length;
      $("#summaryLatest").textContent = latest;
      $("#summaryBest").textContent = (best.squat || best.bench || best.deadlift)
        ? `深蹲 ${formatKg(best.squat)} / 卧推 ${formatKg(best.bench)} / 硬拉 ${formatKg(best.deadlift)} / 总和 ${formatKg(total)}`
        : "-";
      $("#bestSquat").textContent = formatKg(best.squat);
      $("#bestBench").textContent = formatKg(best.bench);
      $("#bestDeadlift").textContent = formatKg(best.deadlift);
      $("#bestTotal").textContent = total > 0 ? `${total.toFixed(1)} kg` : "-";
    }

    function renderHistory() {
      const filtered = records
        .filter((record) => historyFilter === "all" || record.exercise === historyFilter)
        .slice()
        .reverse();
      $("#countTotal").textContent = records.length;
      $("#countSquat").textContent = records.filter((record) => record.exercise === "squat").length;
      $("#countBench").textContent = records.filter((record) => record.exercise === "bench").length;
      $("#countDeadlift").textContent = records.filter((record) => record.exercise === "deadlift").length;

      const list = $("#recordsList");
      const empty = $("#recordsEmpty");
      if (!filtered.length) {
        list.innerHTML = "";
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";
      list.innerHTML = filtered.map((record) => {
        const e1rm = estimate1RM(Number(record.weight), Number(record.reps));
        return `
          <div class="record">
            <div class="record-date">${record.date.slice(5)}</div>
            <div class="badge ${record.exercise}">${names[record.exercise]}</div>
            <div class="record-main">
              <strong>${record.weight} kg</strong>
              <span>${record.sets} 组 × ${record.reps} 次 · 估算 1RM ${e1rm} kg</span>
            </div>
            <button class="delete" data-delete="${record.id}" aria-label="删除">×</button>
          </div>
        `;
      }).join("");
      $$("[data-delete]").forEach((button) => {
        button.addEventListener("click", () => deleteRecord(Number(button.dataset.delete)));
      });
    }

    function chartPoints(exercise) {
      return records
        .filter((record) => record.exercise === exercise)
        .map((record) => ({
          date: record.date,
          time: new Date(record.date).getTime(),
          value: chartMode === "raw" ? Number(record.weight) : estimate1RM(Number(record.weight), Number(record.reps))
        }));
    }

    function renderChart() {
      const canvas = $("#progressChart");
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const width = rect.width;
      const height = rect.height;
      ctx.clearRect(0, 0, width, height);

      const series = ["squat", "bench", "deadlift"].map((exercise) => ({ exercise, points: chartPoints(exercise) }));
      const points = [];
      series.forEach((item) => {
        item.points.forEach((point) => points.push(point));
      });
      const pad = { left: 48, right: 16, top: 20, bottom: 38 };

      ctx.fillStyle = "#111821";
      ctx.fillRect(0, 0, width, height);

      if (!points.length) {
        ctx.fillStyle = "#96a4b8";
        ctx.font = "14px Microsoft YaHei, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("添加训练记录后会显示趋势曲线", width / 2, height / 2);
        return;
      }

      const minTime = Math.min(...points.map((p) => p.time));
      const maxTime = Math.max(...points.map((p) => p.time));
      const minValue = Math.min(...points.map((p) => p.value));
      const maxValue = Math.max(...points.map((p) => p.value));
      const timeRange = Math.max(1, maxTime - minTime);
      const valuePadding = Math.max(5, (maxValue - minValue) * .12);
      const yMin = Math.max(0, minValue - valuePadding);
      const yMax = maxValue + valuePadding;
      const yRange = Math.max(1, yMax - yMin);
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;

      const x = (time) => pad.left + ((time - minTime) / timeRange) * plotW;
      const y = (value) => pad.top + (1 - (value - yMin) / yRange) * plotH;

      ctx.strokeStyle = "#263447";
      ctx.lineWidth = 1;
      ctx.fillStyle = "#96a4b8";
      ctx.font = "11px Microsoft YaHei, sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let i = 0; i <= 4; i++) {
        const yy = pad.top + (plotH / 4) * i;
        const value = yMax - (yRange / 4) * i;
        ctx.beginPath();
        ctx.moveTo(pad.left, yy);
        ctx.lineTo(width - pad.right, yy);
        ctx.stroke();
        ctx.fillText(Math.round(value), pad.left - 8, yy);
      }

      series.forEach(({ exercise, points: pts }) => {
        if (!pts.length) return;
        ctx.strokeStyle = colors[exercise];
        ctx.fillStyle = colors[exercise];
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        pts.forEach((point, index) => {
          const px = x(point.time);
          const py = y(point.value);
          if (index === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        });
        ctx.stroke();
        pts.forEach((point) => {
          ctx.beginPath();
          ctx.arc(x(point.time), y(point.value), 4, 0, Math.PI * 2);
          ctx.fill();
        });
      });

      ctx.fillStyle = "#96a4b8";
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillText(chartMode === "raw" ? "重量 (kg)" : "估算 1RM (kg)", pad.left, 4);
    }

    function calcDOTS(currentGender, bw, squat, bench, deadlift) {
      const c = currentGender === "m"
        ? [-0.0000010930, 0.0007391293, -0.1918759221, 24.0900756, -307.75076]
        : [-0.0000010706, 0.0005158568, -0.1126655495, 13.6175032, -53.17388];
      const denom = bw * (bw * (bw * (bw * c[0] + c[1]) + c[2]) + c[3]) + c[4];
      const total = squat + bench + deadlift;
      return {
        total,
        score: bw > 0 && total > 0 && denom !== 0 ? Math.round((500 / denom) * total * 10) / 10 : 0
      };
    }

    function fillDotsFromBest() {
      const best = bestLifts();
      $("#dotsSquat").value = best.squat || "";
      $("#dotsBench").value = best.bench || "";
      $("#dotsDeadlift").value = best.deadlift || "";
      renderDots();
    }

    function renderDots() {
      const bw = Number($("#bodyweight").value);
      const squat = Number($("#dotsSquat").value) || 0;
      const bench = Number($("#dotsBench").value) || 0;
      const deadlift = Number($("#dotsDeadlift").value) || 0;
      const result = calcDOTS(gender, bw, squat, bench, deadlift);
      $("#dotsScore").textContent = result.score > 0 ? result.score.toFixed(1) : "-";
      $("#dotsTotal").textContent = result.total > 0 ? `${result.total} kg` : "-";
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(records, null, 2)], { type: "application/json" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `powerlifting-backup-${todayISO()}.json`;
      link.click();
      URL.revokeObjectURL(link.href);
      showToast("已导出");
    }

    function importData(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const imported = JSON.parse(event.target.result);
          if (!Array.isArray(imported) || !imported.every(isValidRecord)) {
            showToast("无效备份文件");
            return;
          }
          const merged = [...records, ...imported];
          const seen = new Set();
          records = merged.filter((record) => {
            const key = `${record.date}|${record.exercise}|${record.weight}|${record.reps}|${record.sets}`;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          }).sort((a, b) => new Date(a.date) - new Date(b.date) || Number(a.id || 0) - Number(b.id || 0));
          saveRecords();
          renderAll();
          showToast(`已合并导入 ${imported.length} 条记录`);
        } catch {
          showToast("解析失败");
        }
      };
      reader.readAsText(file);
    }

    function clearData() {
      if (!confirm("确定清空所有训练记录？此操作不可撤销。")) return;
      records = [];
      saveRecords();
      renderAll();
      showToast("已清空");
    }

    function renderAll() {
      renderSummary();
      renderHistory();
      renderChart();
      renderDots();
    }

    function bindEvents() {
      setTrainDate(todayISO());
      $("#dateToggle").addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        toggleCalendar();
      });
      $("#prevMonth").addEventListener("click", () => { calendarView.setMonth(calendarView.getMonth() - 1); renderCalendar(); });
      $("#nextMonth").addEventListener("click", () => { calendarView.setMonth(calendarView.getMonth() + 1); renderCalendar(); });
      document.addEventListener("click", (event) => {
        if (!$("#datePicker").contains(event.target)) toggleCalendar(false);
      });
      $("#addRecord").addEventListener("click", addRecord);
      $$(".tab").forEach((button) => button.addEventListener("click", () => switchView(button.dataset.view)));
      $$("#exerciseTabs [data-exercise]").forEach((button) => {
        button.addEventListener("click", () => {
          currentExercise = button.dataset.exercise;
          setActive("#exerciseTabs", "data-exercise", currentExercise);
        });
      });
      $$("#historyFilter [data-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          historyFilter = button.dataset.filter;
          setActive("#historyFilter", "data-filter", historyFilter);
          renderHistory();
        });
      });
      $$("[data-mode]").forEach((button) => {
        button.addEventListener("click", () => {
          chartMode = button.dataset.mode;
          setActive("#view-chart", "data-mode", chartMode);
          renderChart();
        });
      });
      $$("[data-gender]").forEach((button) => {
        button.addEventListener("click", () => {
          gender = button.dataset.gender;
          setActive("#genderTabs", "data-gender", gender);
          renderDots();
        });
        button.addEventListener("touchend", (event) => {
          event.preventDefault();
          gender = button.dataset.gender;
          setActive("#genderTabs", "data-gender", gender);
          renderDots();
        }, { passive: false });
      });
      ["bodyweight", "dotsSquat", "dotsBench", "dotsDeadlift"].forEach((id) => {
        $(`#${id}`).addEventListener("input", renderDots);
      });
      $("#fillDots").addEventListener("click", fillDotsFromBest);
      $("#exportData").addEventListener("click", exportData);
      $("#importData").addEventListener("change", (event) => {
        importData(event.target.files[0]);
        event.target.value = "";
      });
      $("#clearData").addEventListener("click", clearData);
      window.addEventListener("resize", () => {
        if ($("#view-chart").classList.contains("active")) renderChart();
      });
    }

    bindEvents();
    renderAll();
  </script>
</body>
</html>
